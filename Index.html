<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PF Debate OS</title>
    <style>
        :root { --bg: #2c3e50; --taskbar: #1a252f; --win-bg: #ecf0f1; }
        body { margin: 0; height: 100vh; background: #34495e; font-family: sans-serif; overflow: hidden; }
        
        /* Desktop Area */
        #desktop { width: 100%; height: calc(100% - 40px); position: relative; }
        
        /* Window Styling */
        .window {
            position: absolute; width: 600px; background: var(--win-bg);
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .title-bar {
            background: #bdc3c7; padding: 10px; cursor: move;
            display: flex; justify-content: space-between; font-weight: bold;
        }
        .content { padding: 20px; flex-grow: 1; }
        textarea { width: 100%; height: 300px; border: 1px solid #ccc; padding: 10px; border-radius: 4px; font-family: 'Courier New', monospace; }

        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: var(--taskbar); display: flex; align-items: center; padding: 0 10px;
        }
        .start-btn { background: #3498db; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="window" id="caseWindow" style="top: 50px; left: 50px;">
        <div class="title-bar" id="caseHeader">
            <span>PF Case Editor v1.0</span>
            <span style="color: #e74c3c;">●</span>
        </div>
        <div class="content">
            <label>Contention 1 Tagline:</label><br>
            <input type="text" style="width: 95%; margin-bottom: 10px;" placeholder="Economy..."><br>
            <label>Case Body:</label>
            <textarea placeholder="Paste your cards and warrants here..."></textarea>
            <button style="margin-top: 10px;" onclick="alert('Case Saved Locally!')">Save Case</button>
        </div>
    </div>
</div>

<div id="taskbar">
    <button class="start-btn">PF-OS</button>
</div>

<script>
    // Make the window draggable
    dragElement(document.getElementById("caseWindow"));

    function dragElement(elmnt) {
      var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      if (document.getElementById(elmnt.id + "Header")) {
        document.getElementById(elmnt.id + "Header").onmousedown = dragMouseDown;
      }
      function dragMouseDown(e) {
        e.preventDefault();
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDragElement;
        document.onmousemove = elementDrag;
      }
      function elementDrag(e) {
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
        elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
      }
      function closeDragElement() {
        document.onmouseup = null;
        document.onmousemove = null;
      }
    }
</script>

</body>
</html>
